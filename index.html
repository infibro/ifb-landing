<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════
         Primary SEO
    ═══════════════════════════════════════ -->
    <title>Invoice Finance Brokers | Compare UK Invoice Finance Providers</title>
    <meta name="description" content="Compare invoice finance providers across the UK. Unlock cash tied up in unpaid invoices within 24 hours. Get a free quote from independent invoice finance brokers today." />
    <meta name="keywords" content="invoice finance, invoice finance brokers, invoice factoring, invoice discounting, UK invoice finance, business cash flow, selective invoice finance" />
    <link rel="canonical" href="https://www.invoicefinancebrokers.co.uk/" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="author" content="Invoice Finance Brokers" />

    <!-- ═══════════════════════════════════════
         Open Graph (Facebook / LinkedIn)
    ═══════════════════════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Invoice Finance Brokers" />
    <meta property="og:title" content="Invoice Finance Brokers | Compare UK Invoice Finance Providers" />
    <meta property="og:description" content="Unlock cash tied up in unpaid invoices. Compare UK invoice finance providers and get a fast decision. Free, independent advice from specialist brokers." />
    <meta property="og:url" content="https://www.invoicefinancebrokers.co.uk/" />
    <meta property="og:image" content="https://www.invoicefinancebrokers.co.uk/hero-bg.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_GB" />

    <!-- ═══════════════════════════════════════
         Twitter / X Card
    ═══════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Invoice Finance Brokers | Compare UK Invoice Finance Providers" />
    <meta name="twitter:description" content="Unlock cash tied up in unpaid invoices. Compare UK invoice finance providers and get a fast decision." />
    <meta name="twitter:image" content="https://www.invoicefinancebrokers.co.uk/hero-bg.jpg" />

    <!-- ═══════════════════════════════════════
         Structured Data — WebSite
    ═══════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Invoice Finance Brokers",
      "url": "https://www.invoicefinancebrokers.co.uk/",
      "description": "Independent invoice finance brokers helping UK businesses compare and access invoice finance facilities.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.invoicefinancebrokers.co.uk/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ═══════════════════════════════════════
         Structured Data — Organization
    ═══════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Invoice Finance Brokers",
      "url": "https://www.invoicefinancebrokers.co.uk/",
      "logo": "https://www.invoicefinancebrokers.co.uk/logo.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "funding@invoicefinancebrokers.co.uk",
        "contactType": "customer service",
        "areaServed": "GB",
        "availableLanguage": "English"
      },
      "sameAs": []
    }
    </script>

    <!-- ═══════════════════════════════════════
         Performance Hints
    ═══════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://supabase.co" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
